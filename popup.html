<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PATTI SHOT</title>
  <style>
    :root {
      --patti-pink: #D6336C;
      --patti-yellow: #FFC800;
    }
    body {
      margin: 0;
      width: 280px;
      font-family: "Meiryo", "Hiragino Sans", sans-serif;
      background: #fff;
      color: #333;
    }
    header {
      background: var(--patti-pink);
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 1px;
    }
    header .version {
      font-size: 11px;
      opacity: 0.9;
    }
    main {
      padding: 14px;
    }
    #captureBtn {
      display: block;
      width: 100%;
      padding: 14px 0;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: var(--patti-pink);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #captureBtn:hover:not(:disabled) {
      filter: brightness(1.1);
    }
    #captureBtn:disabled {
      background: #e8a2ba;
      cursor: default;
    }
    .formats {
      display: flex;
      gap: 16px;
      margin: 12px 2px 0;
      font-size: 13px;
    }
    .formats label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .formats input {
      accent-color: var(--patti-pink);
    }
    #status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 13px;
      text-align: center;
      color: var(--patti-pink);
      font-weight: bold;
    }
    #status.note {
      color: #a07800;
      font-weight: normal;
      font-size: 11px;
    }
    #unsupported {
      display: none;
      padding: 8px 4px;
      text-align: center;
      font-size: 13px;
      color: #666;
      background: #fff6d6;
      border: 1px solid var(--patti-yellow);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>PATTI SHOT</h1>
    <span class="version" id="version"></span>
  </header>
  <main>
    <div id="unsupported">このページは撮影できません</div>
    <button id="captureBtn">撮影</button>
    <div class="formats">
      <label><input type="checkbox" id="fmtPng" checked> PNG</label>
      <label><input type="checkbox" id="fmtPdf" checked> PDF</label>
    </div>
    <div id="status"></div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
